<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Todo List Application</title>
    <style>
        :root {
            --primary: #4285f4;
            --secondary: #34a853;
            --danger: #ea4335;
            --warning: #fbbc04;
            --bg: #0f1419;
            --card-bg: rgba(20, 25, 35, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* INPUT SECTION */
        .input-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #taskInput {
            flex: 1;
            background: rgba(26, 31, 41, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 16px rgba(66, 133, 244, 0.3);
            background: rgba(26, 31, 41, 0.8);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #357ae8);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(66, 133, 244, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #c5221f);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(234, 67, 53, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--secondary), #2d8e47);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(52, 168, 83, 0.4);
        }

        /* PRIORITY & CATEGORY */
        .options-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group select {
            background: rgba(26, 31, 41, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(26, 31, 41, 0.8);
        }

        /* FILTER & SORT */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* TASK LIST */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.3s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.2);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox:hover {
            background: rgba(66, 133, 244, 0.2);
        }

        .task-item.completed .checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-icon {
            color: white;
            font-size: 14px;
            display: none;
        }

        .task-item.completed .checkbox-icon {
            display: block;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            margin-bottom: 6px;
            font-size: 1rem;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
        }

        .badge.priority-high {
            background: rgba(234, 67, 53, 0.2);
            color: #ff6b6b;
        }

        .badge.priority-medium {
            background: rgba(251, 188, 4, 0.2);
            color: #ffc107;
        }

        .badge.priority-low {
            background: rgba(52, 168, 83, 0.2);
            color: #5cdb64;
        }

        .badge.category {
            background: rgba(66, 133, 244, 0.2);
            color: #64b5f6;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .task-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .task-btn:hover {
            background: var(--danger);
            color: white;
        }

        .task-btn.edit:hover {
            background: var(--primary);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* ALERTS */
        .alert {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease-out;
        }

        .alert-success {
            background: rgba(52, 168, 83, 0.2);
            border: 1px solid rgba(52, 168, 83, 0.5);
            color: #5cdb64;
        }

        .alert-error {
            background: rgba(234, 67, 53, 0.2);
            border: 1px solid rgba(234, 67, 53, 0.5);
            color: #ff6b6b;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-form .form-group {
            gap: 10px;
        }

        .modal-form input,
        .modal-form textarea,
        .modal-form select {
            background: rgba(26, 31, 41, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .modal-form input:focus,
        .modal-form textarea:focus,
        .modal-form select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(26, 31, 41, 0.8);
        }

        .modal-form textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .input-group {
                flex-direction: column;
            }

            .options-row {
                grid-template-columns: 1fr;
            }

            .controls {
                justify-content: center;
            }

            .task-item {
                flex-wrap: wrap;
            }

            .task-actions {
                width: 100%;
                margin-top: 10px;
            }

            .modal-content {
                width: 95%;
            }
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(66, 133, 244, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1>✅ TaskFlow</h1>
        <p>Manage your tasks efficiently with local storage</p>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalTasks">0</div>
            <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completedTasks">0</div>
            <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeTasks">0</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completionRate">0%</div>
            <div class="stat-label">Progress</div>
        </div>
    </div>

    <!-- ALERTS -->
    <div id="alertContainer"></div>

    <!-- INPUT SECTION -->
    <div class="input-section">
        <div class="input-group">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button class="btn btn-primary" onclick="openTaskModal()">
                ➕ Add Task
            </button>
        </div>

        <div class="options-row">
            <div class="form-group">
                <label>Priority Filter</label>
                <select id="priorityFilter" onchange="applyFilters()">
                    <option value="">All Priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category Filter</label>
                <select id="categoryFilter" onchange="applyFilters()">
                    <option value="">All Categories</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button class="filter-btn active" onclick="filterTasks('all')">All</button>
        <button class="filter-btn" onclick="filterTasks('active')">Active</button>
        <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
        <button class="filter-btn" onclick="sortTasks('date')">Sort by Date</button>
        <button class="filter-btn" onclick="sortTasks('priority')">Sort by Priority</button>
        <button class="btn btn-secondary" style="margin-left: auto;" onclick="clearCompleted()">
            🗑️ Clear Completed
        </button>
    </div>

    <!-- TASK LIST -->
    <div id="taskList" class="task-list">
        <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h2>No tasks yet</h2>
            <p>Create your first task to get started!</p>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">Add New Task</span>
            <button class="modal-close" onclick="closeTaskModal()">✕</button>
        </div>
        <form class="modal-form" onsubmit="saveTask(event)">
            <div class="form-group">
                <label>Task Name *</label>
                <input type="text" id="modalTaskName" placeholder="Enter task name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="modalTaskDesc" placeholder="Add task description (optional)"></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="modalTaskPriority">
                    <option value="low">🟢 Low</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="high">🔴 High</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="modalTaskCategory">
                    <option value="other">Other</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="modalTaskDueDate">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
                <button type="submit" class="btn btn-success">Save Task</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ========== STATE MANAGEMENT ==========
    let tasks = [];
    let filterMode = 'all';
    let sortMode = 'date';
    let editingTaskId = null;
    let priorityFilterMode = '';
    let categoryFilterMode = '';

    // ========== INITIALIZATION ==========
    function init() {
        loadTasks();
        renderTasks();
        updateStats();
    }

    // ========== LOCAL STORAGE FUNCTIONS ==========
    function loadTasks() {
        const stored = localStorage.getItem('tasks');
        tasks = stored ? JSON.parse(stored) : [];
    }

    function saveTasks() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function saveTasks() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    // ========== TASK FUNCTIONS ==========
    function openTaskModal() {
        editingTaskId = null;
        document.getElementById('modalTitle').textContent = 'Add New Task';
        document.getElementById('modalTaskName').value = '';
        document.getElementById('modalTaskDesc').value = '';
        document.getElementById('modalTaskPriority').value = 'medium';
        document.getElementById('modalTaskCategory').value = 'other';
        document.getElementById('modalTaskDueDate').value = '';
        document.getElementById('taskModal').classList.add('active');
        document.getElementById('modalTaskName').focus();
    }

    function closeTaskModal() {
        document.getElementById('taskModal').classList.remove('active');
        editingTaskId = null;
    }

    function saveTask(event) {
        event.preventDefault();

        const name = document.getElementById('modalTaskName').value.trim();
        if (!name) {
            showAlert('Task name cannot be empty!', 'error');
            return;
        }

        const task = {
            id: editingTaskId || Date.now(),
            name: name,
            description: document.getElementById('modalTaskDesc').value,
            priority: document.getElementById('modalTaskPriority').value,
            category: document.getElementById('modalTaskCategory').value,
            dueDate: document.getElementById('modalTaskDueDate').value,
            completed: editingTaskId ? tasks.find(t => t.id === editingTaskId).completed : false,
            createdAt: editingTaskId ? tasks.find(t => t.id === editingTaskId).createdAt : new Date().toISOString()
        };

        if (editingTaskId) {
            const index = tasks.findIndex(t => t.id === editingTaskId);
            tasks[index] = task;
            showAlert('✓ Task updated successfully!', 'success');
        } else {
            tasks.push(task);
            showAlert('✓ Task added successfully!', 'success');
        }

        saveTasks();
        renderTasks();
        updateStats();
        closeTaskModal();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        editingTaskId = id;
        document.getElementById('modalTitle').textContent = 'Edit Task';
        document.getElementById('modalTaskName').value = task.name;
        document.getElementById('modalTaskDesc').value = task.description;
        document.getElementById('modalTaskPriority').value = task.priority;
        document.getElementById('modalTaskCategory').value = task.category;
        document.getElementById('modalTaskDueDate').value = task.dueDate;
        document.getElementById('taskModal').classList.add('active');
        document.getElementById('modalTaskName').focus();
    }

    function deleteTask(id) {
        if (confirm('Are you sure you want to delete this task?')) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
            showAlert('✓ Task deleted successfully!', 'success');
        }
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            saveTasks();
            renderTasks();
            updateStats();
        }
    }

    function clearCompleted() {
        const completed = tasks.filter(t => t.completed);
        if (completed.length === 0) {
            showAlert('No completed tasks to clear', 'error');
            return;
        }

        if (confirm(`Delete ${completed.length} completed task(s)?`)) {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
            updateStats();
            showAlert('✓ Completed tasks cleared!', 'success');
        }
    }

    // ========== FILTER & SORT FUNCTIONS ==========
    function filterTasks(mode) {
        filterMode = mode;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        renderTasks();
    }

    function sortTasks(mode) {
        sortMode = mode;
        renderTasks();
    }

    function applyFilters() {
        priorityFilterMode = document.getElementById('priorityFilter').value;
        categoryFilterMode = document.getElementById('categoryFilter').value;
        renderTasks();
    }

    // ========== RENDER FUNCTIONS ==========
    function renderTasks() {
        let filtered = [...tasks];

        // Apply status filter
        if (filterMode === 'active') {
            filtered = filtered.filter(t => !t.completed);
        } else if (filterMode === 'completed') {
            filtered = filtered.filter(t => t.completed);
        }

        // Apply priority filter
        if (priorityFilterMode) {
            filtered = filtered.filter(t => t.priority === priorityFilterMode);
        }

        // Apply category filter
        if (categoryFilterMode) {
            filtered = filtered.filter(t => t.category === categoryFilterMode);
        }

        // Apply sorting
        if (sortMode === 'priority') {
            const priorityOrder = { high: 1, medium: 2, low: 3 };
            filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
        } else if (sortMode === 'date') {
            filtered.sort((a, b) => {
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            });
        }

        const taskList = document.getElementById('taskList');

        if (filtered.length === 0) {
            taskList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h2>No tasks found</h2>
                    <p>${filterMode === 'completed' ? 'No completed tasks yet' : 'Create your first task to get started!'}</p>
                </div>
            `;
            return;
        }

        taskList.innerHTML = filtered.map(task => `
            <div class="task-item ${task.completed ? 'completed' : ''}">
                <div class="checkbox" onclick="toggleTask(${task.id})">
                    <span class="checkbox-icon">✓</span>
                </div>
                <div class="task-content">
                    <div class="task-text">${escapeHtml(task.name)}</div>
                    <div class="task-meta">
                        <span class="badge priority-${task.priority}">
                            ${task.priority === 'high' ? '🔴' : task.priority === 'medium' ? '🟡' : '🟢'} ${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}
                        </span>
                        <span class="badge category">📁 ${task.category}</span>
                        ${task.dueDate ? `<span class="badge">📅 ${formatDate(task.dueDate)}</span>` : ''}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="task-btn edit" onclick="editTask(${task.id})" title="Edit">✎</button>
                    <button class="task-btn" onclick="deleteTask(${task.id})" title="Delete">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const active = total - completed;
        const rate = total === 0 ? 0 : Math.round((completed / total) * 100);

        document.getElementById('totalTasks').textContent = total;
        document.getElementById('completedTasks').textContent = completed;
        document.getElementById('activeTasks').textContent = active;
        document.getElementById('completionRate').textContent = rate + '%';
    }

    // ========== UTILITY FUNCTIONS ==========
    function showAlert(message, type = 'success') {
        const container = document.getElementById('alertContainer');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type}`;
        alert.innerHTML = `<span>${message}</span>`;
        container.appendChild(alert);
        setTimeout(() => alert.remove(), 4000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ========== KEYBOARD SHORTCUTS ==========
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeTaskModal();
        }
        if (e.ctrlKey && e.key === 'n') {
            e.preventDefault();
            openTaskModal();
        }
    });

    // ========== QUICK ADD FROM INPUT ==========
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const name = e.target.value.trim();
            if (name) {
                const task = {
                    id: Date.now(),
                    name: name,
                    description: '',
                    priority: 'medium',
                    category: 'other',
                    dueDate: '',
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                tasks.push(task);
                saveTasks();
                renderTasks();
                updateStats();
                e.target.value = '';
                showAlert('✓ Task added successfully!', 'success');
            }
        }
    });

    // ========== CLOSE MODAL ON OUTSIDE CLICK ==========
    document.getElementById('taskModal').addEventListener('click', (e) => {
        if (e.target.id === 'taskModal') {
            closeTaskModal();
        }
    });

    // ========== INITIALIZE ON LOAD ==========
    window.addEventListener('load', init);
</script>

</body>
</html>
