<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3 Saudara | Gemini Studio</title>
    <style>
        :root {
            --primary: #4285f4;
            --secondary: #34a853;
            --danger: #ea4335;
            --bg: #0b0d10;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(20, 25, 35, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b0d10 0%, #161b22 100%);
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 280px;
            background: rgba(15, 18, 25, 0.95);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: "✨";
            font-size: 1.8rem;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-link {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover {
            background: rgba(66, 133, 244, 0.2);
            color: var(--primary);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-link::before {
            font-size: 1.2rem;
            min-width: 20px;
        }

        .nav-link[data-page="dashboard"]::before {
            content: "📊";
        }

        .nav-link[data-page="text-to-image"]::before {
            content: "🖼️";
        }

        .nav-link[data-page="text-to-video"]::before {
            content: "🎬";
        }

        .nav-link[data-page="api-manager"]::before {
            content: "🔑";
        }

        /* MAIN CONTENT */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            color: #aaa;
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 12px 48px rgba(66, 133, 244, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ddd;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: #1a1f29;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: 'Google Sans', sans-serif;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(26, 31, 41, 0.8);
            box-shadow: 0 0 16px rgba(66, 133, 244, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: linear-gradient(135deg, var(--primary), #357ae8);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(66, 133, 244, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #34a853, #2d8e47);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ea4335, #c5221f);
        }

        /* ALERTS */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(52, 168, 83, 0.2);
            border: 1px solid rgba(52, 168, 83, 0.5);
            color: #5cdb64;
        }

        .alert-error {
            background: rgba(234, 67, 53, 0.2);
            border: 1px solid rgba(234, 67, 53, 0.5);
            color: #ff6b6b;
        }

        .alert-info {
            background: rgba(66, 133, 244, 0.2);
            border: 1px solid rgba(66, 133, 244, 0.5);
            color: #64b5f6;
        }

        /* LOADER */
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(66, 133, 244, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loader h2 {
            font-size: 1.2rem;
            color: var(--primary);
        }

        /* STATUS */
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-connected {
            background: rgba(52, 168, 83, 0.2);
            color: #5cdb64;
        }

        .status-disconnected {
            background: rgba(234, 67, 53, 0.2);
            color: #ff6b6b;
        }

        /* RESULTS */
        .result-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(26, 31, 41, 0.5);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .result-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-top: 15px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-item {
            background: rgba(26, 31, 41, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .grid-item strong {
            color: var(--primary);
        }

        /* FRAME INPUT SECTION */
        .frame-section {
            background: rgba(26, 31, 41, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .frame-section h4 {
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .frame-upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .frame-upload-box {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(26, 31, 41, 0.3);
        }

        .frame-upload-box:hover {
            border-color: var(--primary);
            background: rgba(66, 133, 244, 0.1);
        }

        .frame-upload-box input[type="file"] {
            display: none;
        }

        .frame-preview {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }

        .frame-info {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 10px;
        }

        .frame-delete-btn {
            background: linear-gradient(135deg, #ea4335, #c5221f);
            padding: 8px 15px;
            margin-top: 10px;
            font-size: 0.85rem;
            width: auto;
        }

        /* LOOP CONFIG */
        .loop-config {
            background: rgba(26, 31, 41, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 15px;
        }

        .loop-config-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .loop-config-item label {
            min-width: 120px;
            margin: 0;
            color: #ddd;
        }

        .loop-config-item input[type="range"] {
            flex: 1;
            padding: 0;
            width: auto;
        }

        .loop-config-item span {
            min-width: 50px;
            text-align: right;
            color: var(--primary);
            font-weight: 600;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                padding: 15px;
                flex-direction: row;
                align-items: center;
                gap: 20px;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            #nav-list {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            #main-content {
                padding: 20px;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .frame-upload-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <div id="nav-list">
            <div class="nav-link active" data-page="dashboard" onclick="render('dashboard')">Dashboard</div>

        <h2 id="loader-text">Memproses via Gemini...</h2>

        const showLoader = (text = "Memproses via Gemini...") => {
            document.getElementById('loader-text').textContent = text;
            document.getElementById('loader').style.display = 'flex';
        };

        const hideLoader = () => {
            document.getElementById('loader').style.display = 'none';
        };

        const showAlert = (message, type = 'info') => {
            const container = document.getElementById('alerts-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<span>${message}</span>`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);

            const key = localStorage.getItem('gemini_api_key');
            return key && key.trim().length > 0;
        };

                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn-secondary" style="flex: 1;">💾 Simpan API Key</button>
                            <button type="button" onclick="togglePasswordVisibility()" style="flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border);">👁️ Tampilkan/Sembunyikan</button>
                        </div>
                    </form>
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                    <div class="form-group">
                        <label>✅ Status Kunci</label>
                        <div style="margin-top: 10px;">
                            ${isApiKeyValid() ? `
                                <span class="status-badge status-connected">✓ API Key Tersimpan</span>
                                <button type="button" onclick="clearKey()" class="btn-danger" style="margin-top: 15px;">🗑️ Hapus API Key</button>
                            ` : `
                                <span class="status-badge status-disconnected">✗ Belum Ada API Key</span>
                            `}
                        </div>
                    </div>
                </div>
            `
        };

        // ========== PAGE RENDERING ==========
        function render(pageId) {
            // Update active nav link
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-page="${pageId}"]`).classList.add('active');

            // Render content
            document.getElementById('render-area').innerHTML = contentData[pageId];

            // Setup event listeners untuk video page
            if (pageId === 'text-to-video') {
                setupVideoPageListeners();
            }

            // Scroll to top
            document.getElementById('main-content').scrollTop = 0;
        }

        // ========== FRAME HANDLING ==========
        function previewFrame(type) {
            const fileInput = document.getElementById(`frame-${type}-input`);
            const preview = document.getElementById(`frame-${type}-preview`);
            const placeholder = document.getElementById(`frame-${type}-placeholder`);
            const deleteBtn = document.getElementById(`frame-${type}-delete`);
            const infoDiv = document.getElementById(`frame-${type}-info`);

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    deleteBtn.style.display = 'block';
                    infoDiv.textContent = `File: ${fileInput.files[0].name} (${(fileInput.files[0].size / 1024 / 1024).toFixed(2)} MB)`;
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function clearFrame(type) {
            const fileInput = document.getElementById(`frame-${type}-input`);
            const preview = document.getElementById(`frame-${type}-preview`);
            const placeholder = document.getElementById(`frame-${type}-placeholder`);
            const deleteBtn = document.getElementById(`frame-${type}-delete`);
            const infoDiv = document.getElementById(`frame-${type}-info`);

            fileInput.value = '';
            preview.style.display = 'none';
            placeholder.style.display = 'block';
            deleteBtn.style.display = 'none';
            infoDiv.textContent = 'Format: JPG, PNG (Resolusi 1920x1080 rekomendasi)';
        }

        // ========== VIDEO PAGE LISTENERS ==========
        function setupVideoPageListeners() {
            const transitionDuration = document.getElementById('transition-duration');
            const loopCount = document.getElementById('loop-count');

            if (transitionDuration) {
                transitionDuration.addEventListener('input', (e) => {
                    document.getElementById('transition-duration-value').textContent = e.target.value + 's';
                    document.getElementById('preview-transition-info').textContent = e.target.value + 's';
                });
            }

            if (loopCount) {
                loopCount.addEventListener('input', (e) => {
                    document.getElementById('loop-count-value').textContent = e.target.value + 'x';
                    document.getElementById('preview-loop-info').textContent = e.target.value + 'x';
                });
            }
        }

        // ========== API KEY FUNCTIONS ==========
        function saveKey(event) {
            event.preventDefault();
            const key = document.getElementById('gemini-key').value.trim();

            if (!key) {
                showAlert('API Key tidak boleh kosong!', 'error');
                return;
            }

            if (key.length < 20) {
                showAlert('API Key terlalu pendek (minimal 20 karakter)', 'error');
                return;
            }

            localStorage.setItem('gemini_api_key', key);
            showAlert('✓ Gemini API Key berhasil disimpan!', 'success');
            document.getElementById('gemini-key').value = '';
            setTimeout(() => render('api-manager'), 1000);
        }

        function clearKey() {
            if (confirm('Yakin ingin menghapus API Key?')) {
                localStorage.removeItem('gemini_api_key');
                showAlert('✓ API Key berhasil dihapus!', 'success');
                setTimeout(() => render('api-manager'), 1000);
            }
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('gemini-key');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // ========== IMAGE GENERATION ==========
        async function generateImage(event) {
            event.preventDefault();

            if (!isApiKeyValid()) {
                showAlert('⚠️ Silakan atur Gemini API Key terlebih dahulu', 'error');
                return;
            }

            const prompt = document.getElementById('image-prompt').value;
            const style = document.getElementById('image-style').value;

            showLoader(`🖼️ Generate gambar "${style}"...`);

            try {
                // Simulasi API call (ganti dengan API Gemini yang sebenarnya)
                await new Promise(resolve => setTimeout(resolve, 3000));

                const resultDiv = document.getElementById('image-result');
                resultDiv.innerHTML = `
                    <div class="result-container">
                        <h3>✨ Hasil Generate Gambar</h3>
                        <p><strong>Prompt:</strong> ${prompt}</p>
                        <p><strong>Gaya:</strong> ${style}</p>
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: 100%; height: 300px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9rem;">
                            [Pratinjau Gambar - Menggunakan Gemini API]
                        </div>
                        <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">Gambar akan ditampilkan di sini setelah dihasilkan oleh API Gemini</p>
                    </div>
                `;

                showAlert('✓ Gambar berhasil digenerate!', 'success');
            } catch (error) {
                showAlert(`❌ Error: ${error.message}`, 'error');
            } finally {
                hideLoader();
            }
        }

        // ========== VIDEO GENERATION WITH LOOPING ==========
        async function generateVideo(event) {
            event.preventDefault();

            if (!isApiKeyValid()) {
                showAlert('⚠️ Silakan atur Gemini API Key terlebih dahulu', 'error');
                return;
            }

            const prompt = document.getElementById('video-prompt').value;
            const duration = document.getElementById('video-duration').value;
            const resolution = document.getElementById('video-resolution').value;
            const transitionMode = document.getElementById('transition-mode').value;
            const transitionDuration = document.getElementById('transition-duration').value;
            const loopCount = document.getElementById('loop-count').value;
            const hasStartFrame = document.getElementById('frame-start-preview').style.display === 'block';
            const hasEndFrame = document.getElementById('frame-end-preview').style.display === 'block';

            showLoader(`🎬 Generate video dengan smooth loop (${loopCount}x)...`);

            try {
                // Simulasi API call
                await new Promise(resolve => setTimeout(resolve, 4000));

                const loopInfo = hasStartFrame && hasEndFrame 
                    ? `<strong style="color: var(--secondary);">✓ Dengan Frame-Based Looping</strong> - Transisi ${transitionMode} ${transitionDuration}s`
                    : `<strong style="color: var(--primary);">Standard Looping</strong> - Tanpa frame awal/akhir`;

                const resultDiv = document.getElementById('video-result');
                resultDiv.innerHTML = `
                    <div class="result-container">
                        <h3>✨ Hasil Generate Video</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                            <div>
                                <p><strong>Prompt:</strong> ${prompt}</p>
                                <p><strong>Durasi:</strong> ${duration} detik × ${loopCount} loop</p>
                            </div>
                            <div>
                                <p><strong>Resolusi:</strong> ${resolution}</p>
                                <p><strong>Mode Loop:</strong> ${loopInfo}</p>
                            </div>
                        </div>
                        <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); width: 100%; height: 300px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9rem; flex-direction: column; gap: 15px;">
                            <span style="font-size: 2rem;">▶️</span>
                            ${hasStartFrame && hasEndFrame ? '<span style="font-size: 0.85rem; opacity: 0.9;">🔄 Seamless Loop dengan Frame Anchor</span>' : '<span style="font-size: 0.85rem; opacity: 0.9;">Standard Video Loop</span>'}
                        </div>
                        <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">Video akan ditampilkan di sini setelah dihasilkan oleh API Veo</p>
                    </div>
                `;

                showAlert(`✓ Video berhasil digenerate dengan ${loopCount}x loop!`, 'success');
            } catch (error) {
                showAlert(`❌ Error: ${error.message}`, 'error');
            } finally {
                hideLoader();
            }
        }

        // ========== INITIALIZE ==========
        window.addEventListener('DOMContentLoaded', () => {
            render('dashboard');
        });
    </script>
</body>
</html>
